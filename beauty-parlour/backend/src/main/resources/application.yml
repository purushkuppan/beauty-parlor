server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:beauty_parlour;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  jwt:
    access-token-expiry-ms: 3600000     # 1 hour
    refresh-token-expiry-ms: 604800000  # 7 days

logging:
  level:
    com.beautyparlour: INFO
