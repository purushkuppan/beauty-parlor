<div class="auth-container">
  <div class="auth-card">
    <h2>Sign In</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="you@example.com" />
        <small *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Valid email is required.
        </small>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Password" />
        <small *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Password is required.
        </small>
      </div>
      <div *ngIf="error" class="error">{{ error }}</div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
    <p class="auth-link">Don't have an account? <a routerLink="/auth/register">Register</a></p>
  </div>
</div>
