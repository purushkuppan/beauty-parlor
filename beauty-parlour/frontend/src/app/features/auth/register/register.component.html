<div class="auth-container">
  <div class="auth-card">
    <h2>Create Account</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" type="text" formControlName="name" placeholder="Your name" />
        <small *ngIf="form.get('name')?.invalid && form.get('name')?.touched">Name is required.</small>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="you@example.com" />
        <small *ngIf="form.get('email')?.invalid && form.get('email')?.touched">Valid email is required.</small>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Min 8 chars, 1 number" />
        <small *ngIf="form.get('password')?.errors?.['minlength'] && form.get('password')?.touched">
          Minimum 8 characters.
        </small>
        <small *ngIf="form.get('password')?.errors?.['noDigit'] && form.get('password')?.touched">
          Must contain at least one number.
        </small>
      </div>
      <div class="form-group">
        <label for="phone">Phone (optional)</label>
        <input id="phone" type="tel" formControlName="phone" placeholder="+91 98765 43210" />
      </div>
      <div *ngIf="error" class="error">{{ error }}</div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>
    <p class="auth-link">Already have an account? <a routerLink="/auth/login">Sign in</a></p>
  </div>
</div>
