<div class="page-header">
  <h1>Book an Appointment</h1>
</div>

<div class="booking-layout">
  <div class="booking-form-card">
    <form [formGroup]="form" (ngSubmit)="book()">
      <div class="form-group">
        <label>Service</label>
        <select formControlName="serviceId" (change)="loadSlots()">
          <option value="">Select a service</option>
          <option *ngFor="let s of services" [value]="s.id">
            {{ s.name }} — ${{ s.price }} ({{ s.durationMins }} min)
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Stylist</label>
        <select formControlName="staffId" (change)="loadSlots()">
          <option value="">Select a stylist</option>
          <option *ngFor="let m of staff" [value]="m.id">{{ m.name }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="date" formControlName="date" [min]="today" (change)="loadSlots()" />
      </div>

      <div class="form-group" *ngIf="slots.length > 0">
        <label>Available Slots</label>
        <div class="slot-grid">
          <button type="button"
                  *ngFor="let slot of slots"
                  [class.selected]="form.get('slot')?.value === slot"
                  (click)="form.patchValue({ slot: slot })">
            {{ slot }}
          </button>
        </div>
      </div>
      <p *ngIf="slots.length === 0 && form.get('date')?.value" class="no-slots">
        No available slots for this date.
      </p>

      <div class="form-group">
        <label>Notes (optional)</label>
        <textarea formControlName="notes" rows="2" placeholder="Any special requests?"></textarea>
      </div>

      <div *ngIf="error" class="error">{{ error }}</div>
      <div *ngIf="success" class="success">{{ success }}</div>

      <button type="submit" class="btn-primary" [disabled]="form.invalid || loading">
        {{ loading ? 'Booking...' : 'Confirm Booking' }}
      </button>
    </form>
  </div>

  <div class="my-appointments">
    <h2>My Appointments</h2>
    <div *ngIf="myAppointments.length === 0" class="empty">No appointments yet.</div>
    <div class="appointment-card" *ngFor="let a of myAppointments">
      <div class="appt-status" [class]="a.status.toLowerCase()">{{ a.status }}</div>
      <h4>{{ a.service.name }}</h4>
      <p>With: {{ a.staff.name }}</p>
      <p>{{ a.startTime | date:'medium' }}</p>
      <button *ngIf="a.status === 'PENDING' || a.status === 'CONFIRMED'"
              class="btn-danger" (click)="cancel(a.id)">Cancel</button>
    </div>
  </div>
</div>
